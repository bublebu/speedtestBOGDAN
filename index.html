<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>speedtestBOGDAN</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');

:root{
    --bg:#020205;
    --accent:#00ff41;
    --red:#ff003c;
    --glass:rgba(5,12,5,.95);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;

    background:var(--bg);

    font-family:'JetBrains Mono', monospace;
    color:white;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

/* =========================
   CANVAS
========================= */

#snakeCanvas{
    position:fixed;
    inset:0;
    z-index:1;
    background:#010401;
}

/* =========================
   UI
========================= */

.interface{
    position:relative;
    z-index:10;

    width:320px;

    padding:35px;

    border-radius:35px;

    background:var(--glass);

    backdrop-filter:blur(25px);

    border:1px solid rgba(0,255,65,.15);

    box-shadow:
        0 0 70px rgba(0,255,65,.08),
        inset 0 0 30px rgba(0,255,65,.04);
}

.title{
    text-align:center;

    color:var(--accent);

    letter-spacing:5px;

    font-size:.9rem;

    margin-bottom:25px;

    text-shadow:0 0 10px var(--accent);
}

.card{
    position:relative;

    background:rgba(0,0,0,.65);

    border-left:4px solid #008f11;

    border-radius:20px;

    padding:18px;

    margin-bottom:14px;

    overflow:hidden;
}

.label{
    display:block;

    margin-bottom:8px;

    color:#00a52a;

    font-size:.55rem;

    letter-spacing:2px;
}

.value{
    font-size:2.2rem;
    font-weight:800;
}

.unit{
    color:var(--accent);
    font-size:.8rem;
}

button{
    position:relative;

    width:100%;

    padding:17px;

    border:none;
    border-radius:15px;

    background:transparent;

    border:2px solid var(--accent);

    color:var(--accent);

    font-family:inherit;
    font-weight:800;

    cursor:pointer;

    overflow:hidden;

    transition:.25s;
}

button:hover:not(:disabled){
    background:var(--accent);
    color:black;
    box-shadow:0 0 30px var(--accent);
}

button:disabled{
    opacity:.6;
    cursor:not-allowed;
}

.loader{
    position:absolute;

    left:0;
    bottom:0;

    height:4px;
    width:0%;

    background:var(--accent);

    transition:width .1s linear;
}
</style>
</head>
<body>

<canvas id="snakeCanvas"></canvas>

<div class="interface">

    <div class="title">speedtestBOGDAN</div>

    <div class="card">
        <span class="label">PING</span>

        <span id="ping" class="value">0</span>
        <span class="unit">ms</span>
    </div>

    <div class="card">
        <span class="label">DOWNLOAD</span>

        <span id="speed" class="value">0</span>
        <span class="unit">Mbps</span>
    </div>

    <button id="start">
        EXECUTE
        <div id="loader" class="loader"></div>
    </button>

</div>

<script>
/* =========================
   ELEMENTS
========================= */

const startBtn = document.getElementById("start");

const pingEl = document.getElementById("ping");

const speedEl = document.getElementById("speed");

const loader = document.getElementById("loader");

/* =========================
   FILES
========================= */

/*
    Работает на GitHub Pages
    и не ломается из-за CORS
*/

const PING_URL =
    "https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js";

const DOWNLOAD_URL =
    "https://proof.ovh.net/files/100Mb.dat";

/* =========================
   PING TEST
========================= */

async function pingTest(){

    const samples = [];

    for(let i = 0; i < 4; i++){

        try{

            const start = performance.now();

            await fetch(
                PING_URL + "?cache=" + Math.random(),
                {
                    cache:"no-store"
                }
            );

            const end = performance.now();

            samples.push(end - start);

        }catch(e){

            console.log("PING ERROR");
        }
    }

    if(samples.length === 0){

        pingEl.innerText = "--";
        return;
    }

    const avg =
        samples.reduce((a,b)=>a+b,0)
        / samples.length;

    pingEl.innerText =
        Math.round(avg);
}

/* =========================
   DOWNLOAD TEST
========================= */

async function downloadTest(){

    try{

        const response = await fetch(
            DOWNLOAD_URL + "?cache=" + Date.now(),
            {
                cache:"no-store"
            }
        );

        const reader =
            response.body.getReader();

        const total =
            Number(
                response.headers.get("content-length")
            ) || 100000000;

        let received = 0;

        const startTime =
            performance.now();

        while(true){

            const {done, value} =
                await reader.read();

            if(done) break;

            received += value.length;

            const seconds =
                (performance.now() - startTime)
                / 1000;

            const mbps =
                ((received * 8) / seconds)
                / 1024
                / 1024;

            speedEl.innerText =
                mbps.toFixed(2);

            const progress =
                (received / total) * 100;

            loader.style.width =
                Math.min(progress,100)
                + "%";
        }

    }catch(e){

        console.log(e);

        speedEl.innerText = "ERR";
    }
}

/* =========================
   START
========================= */

async function startTest(){

    startBtn.disabled = true;

    loader.style.width = "0%";

    pingEl.innerText = "...";

    speedEl.innerText = "0";

    await pingTest();

    await downloadTest();

    startBtn.disabled = false;

    startBtn.innerHTML =
        'RESTART<div id="loader" class="loader" style="width:100%"></div>';
}

startBtn.addEventListener(
    "click",
    startTest
);

/* =========================
   MATRIX SNAKE
========================= */

const canvas =
    document.getElementById("snakeCanvas");

const ctx =
    canvas.getContext("2d");

const tile = 20;

let snake = [
    {x:10,y:10},
    {x:9,y:10}
];

let foods = [
    {x:15,y:15}
];

let dx = 1;
let dy = 0;

function resize(){

    canvas.width = innerWidth;
    canvas.height = innerHeight;
}

addEventListener(
    "resize",
    resize
);

resize();

function updateSnake(){

    const w =
        Math.floor(canvas.width / tile);

    const h =
        Math.floor(canvas.height / tile);

    const head =
        {...snake[0]};

    let target =
        foods[0];

    let minDist =
        Infinity;

    for(const food of foods){

        const dist =
            Math.abs(food.x - head.x)
            +
            Math.abs(food.y - head.y);

        if(dist < minDist){

            minDist = dist;

            target = food;
        }
    }

    if(head.x < target.x && dx !== -1){

        dx = 1;
        dy = 0;
    }
    else if(head.x > target.x && dx !== 1){

        dx = -1;
        dy = 0;
    }
    else if(head.y < target.y && dy !== -1){

        dx = 0;
        dy = 1;
    }
    else if(head.y > target.y && dy !== 1){

        dx = 0;
        dy = -1;
    }

    const next = {
        x:(head.x + dx + w) % w,
        y:(head.y + dy + h) % h
    };

    snake.unshift(next);

    let ate = false;

    foods = foods.filter(food=>{

        if(
            food.x === next.x &&
            food.y === next.y
        ){
            ate = true;
            return false;
        }

        return true;
    });

    if(ate){

        for(let i=0;i<2;i++){

            foods.push({
                x:Math.floor(Math.random()*w),
                y:Math.floor(Math.random()*h)
            });
        }

    }else{

        snake.pop();
    }
}

function draw(){

    ctx.fillStyle = "#010401";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    /* FOOD */

    ctx.shadowBlur = 12;
    ctx.shadowColor = "#ff003c";

    ctx.fillStyle = "#ff003c";

    for(const food of foods){

        ctx.fillRect(
            food.x * tile + 4,
            food.y * tile + 4,
            tile - 8,
            tile - 8
        );
    }

    /* SNAKE */

    ctx.shadowBlur = 10;
    ctx.shadowColor = "#00ff41";

    snake.forEach((part,index)=>{

        ctx.fillStyle =
            index === 0
            ? "#00ff41"
            : "#003b00";

        ctx.fillRect(
            part.x * tile + 1,
            part.y * tile + 1,
            tile - 2,
            tile - 2
        );
    });

    ctx.shadowBlur = 0;
}

let last = 0;

function animate(time){

    if(time - last > 70){

        updateSnake();

        draw();

        last = time;
    }

    requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>

</body>
</html>
