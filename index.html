
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>speedtestBOGDAN</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#020308;
    --panel:#08110d;
    --card:#0b1611;
    --accent:#00ff7b;
    --accent2:#00c853;
    --red:#ff1744;
    --text:#ecfff2;
    --muted:#6bd48e;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:radial-gradient(circle at top,#07150e 0%,#020308 55%);
    font-family:'JetBrains Mono', monospace;
    color:var(--text);
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

#bg{
    position:fixed;
    inset:0;
    z-index:1;
}

.panel{
    position:relative;
    z-index:5;

    width:370px;

    padding:30px;

    border-radius:30px;

    background:rgba(8,15,11,.82);

    border:1px solid rgba(0,255,123,.18);

    backdrop-filter:blur(18px);

    box-shadow:
        0 0 60px rgba(0,255,123,.08),
        inset 0 0 20px rgba(0,255,123,.04);
}

.panel::before{
    content:"";

    position:absolute;
    inset:0;

    border-radius:30px;

    padding:1px;

    background:linear-gradient(
        140deg,
        rgba(0,255,123,.4),
        transparent,
        rgba(0,255,123,.2)
    );

    -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);

    -webkit-mask-composite:xor;

    pointer-events:none;
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo h1{
    font-size:1rem;
    letter-spacing:6px;
    color:var(--accent);
    text-shadow:0 0 18px rgba(0,255,123,.7);
}

.logo p{
    margin-top:8px;
    color:#61c98c;
    font-size:.62rem;
    letter-spacing:2px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin-bottom:14px;
}

.card{
    position:relative;

    overflow:hidden;

    background:linear-gradient(
        180deg,
        rgba(14,25,18,.92),
        rgba(8,15,11,.9)
    );

    border:1px solid rgba(0,255,123,.08);

    border-radius:22px;

    padding:18px;

    min-height:125px;

    box-shadow:
        inset 0 0 20px rgba(0,255,123,.03);
}

.card::after{
    content:"";

    position:absolute;
    top:0;
    left:-100%;

    width:100%;
    height:100%;

    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.05),
        transparent
    );

    animation:shine 5s linear infinite;
}

@keyframes shine{
    100%{
        left:120%;
    }
}

.label{
    display:block;

    color:var(--muted);

    font-size:.62rem;

    letter-spacing:2px;

    margin-bottom:18px;
}

.value{
    font-size:2.4rem;
    font-weight:800;
}

.unit{
    color:var(--accent);
    font-size:.78rem;
}

.bigCard{
    margin-bottom:18px;

    background:linear-gradient(
        180deg,
        rgba(16,32,22,.95),
        rgba(8,15,11,.95)
    );

    border-radius:24px;

    padding:24px;

    border:1px solid rgba(0,255,123,.08);
}

.speedMain{
    display:flex;
    align-items:flex-end;
    gap:10px;
}

#speed{
    font-size:4rem;
    line-height:1;
}

.status{
    margin-top:14px;
    color:#79d89c;
    font-size:.7rem;
    letter-spacing:1px;
}

button{
    position:relative;

    width:100%;

    border:none;

    border-radius:18px;

    padding:18px;

    background:linear-gradient(
        90deg,
        var(--accent2),
        var(--accent)
    );

    color:black;

    font-family:inherit;

    font-weight:800;

    font-size:.9rem;

    letter-spacing:2px;

    cursor:pointer;

    transition:.25s;

    overflow:hidden;

    box-shadow:
        0 0 30px rgba(0,255,123,.25);
}

button:hover:not(:disabled){
    transform:translateY(-2px) scale(1.01);

    box-shadow:
        0 0 40px rgba(0,255,123,.45);
}

button:disabled{
    opacity:.7;
    cursor:wait;
}

.loader{
    position:absolute;

    left:0;
    bottom:0;

    height:4px;
    width:0%;

    background:black;

    transition:width .15s linear;
}

.footer{
    margin-top:14px;

    text-align:center;

    font-size:.55rem;

    color:#5f8d6d;

    letter-spacing:1px;
}

@media(max-width:480px){

    .panel{
        width:92%;
        padding:22px;
    }

    #speed{
        font-size:3.2rem;
    }

    .value{
        font-size:2rem;
    }
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="panel">

    <div class="logo">
        <h1>SPEEDTEST</h1>
        <p>BOGDAN NETWORK ANALYZER</p>
    </div>

    <div class="grid">

        <div class="card">
            <span class="label">PING</span>

            <span id="ping" class="value">0</span>
            <span class="unit">ms</span>
        </div>

        <div class="card">
            <span class="label">JITTER</span>

            <span id="jitter" class="value">0</span>
            <span class="unit">ms</span>
        </div>

    </div>

    <div class="bigCard">

        <span class="label">DOWNLOAD SPEED</span>

        <div class="speedMain">
            <span id="speed" class="value">0</span>
            <span class="unit">Mbps</span>
        </div>

        <div id="status" class="status">
            READY FOR TEST
        </div>

    </div>

    <button id="startBtn">
        START TEST
        <div id="loader" class="loader"></div>
    </button>

    <div class="footer">
        REALTIME NETWORK MEASUREMENT
    </div>

</div>

<script>
const pingEl = document.getElementById("ping");
const jitterEl = document.getElementById("jitter");
const speedEl = document.getElementById("speed");
const startBtn = document.getElementById("startBtn");
const loader = document.getElementById("loader");
const statusEl = document.getElementById("status");

/*
    Стабильный файл.
    Не слишком маленький и не огромный.
*/

const TEST_URL =
    "https://speed.cloudflare.com/__down?bytes=50000000";

const TEST_DURATION = 12000;
const WARMUP = 1500;

/* =========================
   PING + JITTER
========================= */

async function pingTest(){

    const values = [];

    for(let i = 0; i < 6; i++){

        try{

            const start = performance.now();

            await fetch(
                "https://www.cloudflare.com/cdn-cgi/trace?" + Math.random(),
                {
                    cache:"no-store"
                }
            );

            const ping = performance.now() - start;

            values.push(ping);

        }catch(err){
            console.log(err);
        }
    }

    if(!values.length){

        pingEl.innerText = "--";
        jitterEl.innerText = "--";

        return;
    }

    const avg =
        values.reduce((a,b)=>a+b,0)
        / values.length;

    let jitter = 0;

    for(let i = 1; i < values.length; i++){

        jitter += Math.abs(
            values[i] - values[i - 1]
        );
    }

    jitter /= values.length - 1;

    pingEl.innerText = Math.round(avg);
    jitterEl.innerText = Math.round(jitter);
}

/* =========================
   SPEED TEST
========================= */

async function speedTest(){

    try{

        statusEl.innerText = "TESTING DOWNLOAD...";

        const response = await fetch(
            TEST_URL + "&cache=" + Date.now(),
            {
                cache:"no-store"
            }
        );

        const reader = response.body.getReader();

        let received = 0;

        const start = performance.now();

        let smoothSpeed = 0;

        while(true){

            const {done, value} =
                await reader.read();

            if(done) break;

            received += value.length;

            const elapsed =
                performance.now() - start;

            const progress = Math.min(
                (elapsed / TEST_DURATION) * 100,
                100
            );

            loader.style.width = progress + "%";

            if(elapsed < WARMUP){
                continue;
            }

            const seconds =
                (elapsed - WARMUP) / 1000;

            let speedMbps =
                ((received * 8) / seconds)
                / 1024
                / 1024;

            /*
                Сглаживание.
                Убирает безумные скачки.
            */

            smoothSpeed =
                smoothSpeed
                ? (smoothSpeed * 0.75 + speedMbps * 0.25)
                : speedMbps;

            speedEl.innerText =
                smoothSpeed.toFixed(1);

            if(elapsed >= TEST_DURATION){
                break;
            }
        }

        statusEl.innerText = "TEST COMPLETE";

    }catch(err){

        console.error(err);

        speedEl.innerText = "ERR";

        statusEl.innerText = "NETWORK ERROR";
    }
}

/* =========================
   RUN
========================= */

async function runTest(){

    startBtn.disabled = true;

    loader.style.width = "0%";

    pingEl.innerText = "...";
    jitterEl.innerText = "...";
    speedEl.innerText = "0";

    statusEl.innerText = "INITIALIZING";

    await pingTest();

    await speedTest();

    startBtn.disabled = false;

    startBtn.innerHTML =
        'RESTART TEST<div id="loader" class="loader" style="width:100%"></div>';
}

startBtn.addEventListener(
    "click",
    runTest
);

/* =========================
   MATRIX BACKGROUND
========================= */

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}

resize();
addEventListener("resize", resize);

const chars =
    "01アイウエオカサタナABCDEFGHIJKLMNOPQRSTUVWXYZ";

const fontSize = 16;

let columns = [];

function setupColumns(){

    const count =
        Math.floor(canvas.width / fontSize);

    columns = [];

    for(let i = 0; i < count; i++){
        columns[i] = Math.random() * -100;
    }
}

setupColumns();

function drawMatrix(){

    ctx.fillStyle = "rgba(2,3,8,.08)";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.fillStyle = "#00ff7b";

    ctx.font = fontSize + "px JetBrains Mono";

    for(let i = 0; i < columns.length; i++){

        const text =
            chars[
                Math.floor(Math.random() * chars.length)
            ];

        const x = i * fontSize;
        const y = columns[i] * fontSize;

        ctx.fillText(text, x, y);

        if(y > canvas.height && Math.random() > .985){
            columns[i] = 0;
        }

        columns[i]++;
    }

    requestAnimationFrame(drawMatrix);
}

drawMatrix();
</script>
</body>
</html>
