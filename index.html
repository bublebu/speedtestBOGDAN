<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedTest Bogdan v2.0</title>
    <style>
        :root {
            --bg: #030712;
            --card: #111827;
            --accent: #22d3ee; /* Яркий неон */
            --accent-glow: rgba(34, 211, 238, 0.5);
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --success: #10b981;
            --font: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: var(--font);
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Основной контейнер с эффектом глубины */
        .card {
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 10px rgba(34, 211, 238, 0.1);
            text-align: center;
            width: 380px;
            position: relative;
            border: 1px solid rgba(255,255,255,0.03);
            transition: var(--transition);
            transform-style: preserve-3d;
        }

        h1 { margin-top: 0; margin-bottom: 30px; font-size: 1.8rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 15px var(--accent-glow); }

        /* Дизайн метрик */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric {
            background: rgba(255,255,255,0.02);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid transparent;
            transition: var(--transition);
        }

        .metric.active-test {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
            background: rgba(34, 211, 238, 0.03);
        }

        .label { color: var(--text-muted); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 10px;}
        
        /* Анимация цифр при обновлении */
        .value {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1;
            transition: var(--transition);
            display: inline-block;
        }
        
        .value.updating {
            transform: scale(1.1);
            color: var(--accent);
        }

        .unit { color: var(--text-muted); font-size: 1rem; font-weight: 400; margin-left: 4px; }

        /* Кнопка */
        button {
            background: none;
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        button:hover:not(:disabled) {
            background: var(--accent);
            color: var(--bg);
            box-shadow: 0 0 25px var(--accent-glow);
            transform: translateY(-2px);
        }
        
        button:hover:not(:disabled)::before { left: 100%; }

        button:disabled { opacity: 0.3; cursor: not-allowed; border-color: var(--text-muted); color: var(--text-muted); }

        /* Статус бар */
        .status { margin-top: 25px; font-size: 0.9rem; color: var(--text-muted); height: 20px; transition: var(--transition); }
        .status.working { color: var(--accent); font-weight: 600; }
        .status.done { color: var(--success); font-weight: 600; }

        /* ---------- Анимация Змейки ---------- */
        .snake-container {
            position: absolute;
            bottom: 0;
            left: 24px; /* Учитываем padding карты */
            right: 24px;
            height: 4px;
            overflow: hidden;
            border-radius: 2px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .snake-container.active { opacity: 1; }

        .snake {
            position: absolute;
            top: 0;
            left: -150%; /* Стартуем за пределами */
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent 0%, 
                var(--accent) 50%, 
                transparent 100%);
            border-radius: 2px;
            filter: blur(1px);
        }

        /* Ключевые кадры для бесконечного бега змейки */
        @keyframes snake-run {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .snake-container.active .snake {
            animation: snake-run 1.5s linear infinite;
        }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <h1>NetSpeed Bogdan</h1>
    
    <div class="metrics-grid">
        <div class="metric" id="pingMetric">
            <span class="label">Ping</span>
            <span id="ping" class="value">0</span><span class="unit">ms</span>
        </div>
        <div class="metric" id="downloadMetric">
            <span class="label">Download</span>
            <span id="speed" class="value">0.0</span><span class="unit">Mbps</span>
        </div>
    </div>

    <button id="startBtn">НАЧАТЬ ЗАМЕР</button>
    <p id="status" class="status">Готов</p>

    <!-- Контейнер для змейки (скрыт по умолчанию) -->
    <div class="snake-container" id="snakeContainer">
        <div class="snake"></div>
    </div>
</div>

<script>
    const startBtn = document.getElementById('startBtn');
    const speedDisplay = document.getElementById('speed');
    const pingDisplay = document.getElementById('ping');
    const statusDisplay = document.getElementById('status');
    const snakeContainer = document.getElementById('snakeContainer');
    const pingMetric = document.getElementById('pingMetric');
    const downloadMetric = document.getElementById('downloadMetric');

    // Ссылка на тестовый файл (крупное изображение на быстром CDN Unsplash, ~15МБ)
    const testFileUrl = "https://images.unsplash.com/photo-1549221193-4e4b5e2d1921?q=80&w=4000&auto=format&fit=crop"; 

    // Функция для плавного обновления чисел (анимация)
    function animateValue(obj, start, end, duration, decimals = 0) {
        if (start === end) return;
        obj.classList.add('updating');
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            const currentVal = (progress * (end - start) + start).toFixed(decimals);
            obj.innerHTML = currentVal;
            if (progress < 1) {
                window.requestAnimationFrame(step);
            } else {
                obj.classList.remove('updating');
            }
        };
        window.requestAnimationFrame(step);
    }

    async function runTest() {
        // Подготовка UI
        startBtn.disabled = true;
        startBtn.innerText = "ИЗМЕРЯЕМ...";
        statusDisplay.innerText = "Подключение к серверу...";
        statusDisplay.className = "status working";
        snakeContainer.classList.add('active'); // Запускаем змейку

        // Сброс старых значений
        animateValue(pingDisplay, parseFloat(pingDisplay.innerText), 0, 300);
        animateValue(speedDisplay, parseFloat(speedDisplay.innerText), 0, 300, 1);

        // --- Этап 1: Тест Ping (более точный, 5 попыток) ---
        pingMetric.classList.add('active-test');
        const pings = [];
        for(let i=0; i<5; i++) {
            const start = performance.now();
            try {
                // Пингуем саму страницу GitHub Pages для минимизации задержек сети
                await fetch(window.location.href + '?t=' + start, { cache: 'no-store', mode: 'no-cors' });
                pings.push(performance.now() - start);
            } catch (e) { pings.push(999); }
            // Небольшая пауза между пингами
            await new Promise(r => setTimeout(r, 50));
        }
        pingMetric.classList.remove('active-test');

        // Берем минимальный пинг (наиболее точный показатель чистой задержки)
        const minPing = Math.min(...pings);
        animateValue(pingDisplay, 0, minPing, 600);
        statusDisplay.innerText = "Загрузка тестовых данных (15МБ)...";

        // --- Этап 2: Тест загрузки (Улучшенная точность) ---
        downloadMetric.classList.add('active-test');
        const startTime = performance.now();
        
        try {
            // Добавляем уникальный параметр, чтобы CDN не отдал кэшированный файл
            const response = await fetch(testFileUrl + "&nocache=" + startTime, { cache: 'no-store' });
            
            if (!response.ok) throw new Error('Ошибка сети');

            const reader = response.body.getReader();
            let loadedBytes = 0;
            let lastUpdate = startTime;

            // Читаем поток данных по частям для точности
            while(true) {
                const {done, value} = await reader.read();
                if (done) break;
                loadedBytes += value.length;
                
                const now = performance.now();
                // Обновляем UI не чаще чем раз в 200мс для производительности
                if (now - lastUpdate > 200) {
                    const durationSoFar = (now - startTime) / 1000;
                    const currentMbps = ((loadedBytes * 8) / durationSoFar / 1024 / 1024).toFixed(1);
                    speedDisplay.innerText = currentMbps; // Временное обновление без анимации
                    lastUpdate = now;
                }
            }

            const endTime = performance.now();
            const durationInSeconds = (endTime - startTime) / 1000;
            
            // Финальный расчет скорости
            const bitsLoaded = loadedBytes * 8;
            const finalSpeedMbps = (bitsLoaded / durationInSeconds / 1024 / 1024).toFixed(1);

            downloadMetric.classList.remove('active-test');
            // Плавно анимируем от промежуточного значения к финальному
            animateValue(speedDisplay, parseFloat(speedDisplay.innerText), parseFloat(finalSpeedMbps), 800, 1);
            
            statusDisplay.innerText = "Тест успешно завершен!";
            statusDisplay.className = "status done";

        } catch (e) {
            statusDisplay.innerText = "Ошибка замера. Проверьте соединение.";
            statusDisplay.className = "status";
            console.error(e);
            downloadMetric.classList.remove('active-test');
        }

        // Возврат UI в исходное состояние
        startBtn.disabled = false;
        startBtn.innerText = "ПОВТОРИТЬ ТЕСТ";
        snakeContainer.classList.remove('active'); // Останавливаем змейку
    }

    startBtn.addEventListener('click', runTest);

    // Легкий 3D эффект при движении мыши над картой
    const card = document.getElementById('mainCard');
    document.addEventListener('mousemove', (e) => {
        const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
        const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
        card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });
</script>

</body>
</html>
