<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>speedtestBOGDAN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');

        :root {
            --bg: #020205;
            --accent: #00f2ff;
            --snake-body: #10b981;
            --apple: #ef4444;
            --glass: rgba(5, 5, 10, 0.9);
            --text: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Фоновый канвас для змейки */
        #snakeBG {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            opacity: 0.3; /* Чтобы змейка не отвлекала от цифр */
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(0, 242, 255, 0.1);
            border-radius: 40px;
            padding: 50px;
            width: 400px;
            text-align: center;
            box-shadow: 0 0 100px rgba(0, 0, 0, 1);
            position: relative;
        }

        h1 {
            font-size: 1.5rem;
            letter-spacing: 5px;
            margin-bottom: 40px;
            color: var(--accent);
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid #7000ff;
            transition: 0.3s;
        }

        .stat-box.active {
            border-left-color: var(--accent);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.1);
            transform: scale(1.03);
        }

        .label { font-size: 0.7rem; color: #666; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .val { font-size: 3.2rem; font-weight: 800; color: #fff; }
        .unit { color: var(--accent); font-size: 1rem; margin-left: 6px; }

        .go-btn {
            width: 100%;
            padding: 20px;
            border-radius: 18px;
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            cursor: pointer;
            transition: 0.4s;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .go-btn:hover:not(:disabled) {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 30px var(--accent);
        }

        .go-btn:disabled { opacity: 0.3; }

        /* Бегущая полоса (загрузка) */
        .loader-bar {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 5px;
            background: rgba(255,255,255,0.05);
            display: none;
            overflow: hidden;
            border-radius: 0 0 40px 40px;
        }
        .loader-line {
            position: absolute;
            height: 100%; width: 30%;
            background: var(--accent);
            animation: slide 1s infinite linear;
        }
        @keyframes slide { from { left: -40%; } to { left: 110%; } }
    </style>
</head>
<body>

<!-- Фоновая игра -->
<canvas id="snakeBG"></canvas>

<div class="card">
    <h1>speedtestBOGDAN</h1>
    
    <div id="pingBox" class="stat-box">
        <span class="label">Response</span>
        <span id="pVal" class="val">0</span><span class="unit">ms</span>
    </div>

    <div id="speedBox" class="stat-box">
        <span class="label">Transfer Rate</span>
        <span id="sVal" class="val">0</span><span id="sUnit" class="unit">Kbps</span>
    </div>

    <button id="startBtn" class="go-btn">Start Test</button>

    <div id="loader" class="loader-bar"><div class="loader-line"></div></div>
</div>

<script>
    // --- ЛОГИКА ТЕСТА СКОРОСТИ ---
    const startBtn = document.getElementById('startBtn');
    const sVal = document.getElementById('sVal');
    const sUnit = document.getElementById('sUnit');
    const pVal = document.getElementById('pVal');
    const loader = document.getElementById('loader');

    const testFile = "https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=60&w=2500&auto=format&fit=crop";

    async function runTest() {
        startBtn.disabled = true;
        loader.style.display = 'block';
        
        // Ping
        document.getElementById('pingBox').classList.add('active');
        let pings = [];
        for(let i=0; i<3; i++) {
            const t0 = performance.now();
            await fetch(window.location.href + "?p=" + Math.random(), { mode: 'no-cors' });
            pings.push(performance.now() - t0);
        }
        pVal.innerText = Math.min(...pings).toFixed(0);
        document.getElementById('pingBox').classList.remove('active');

        // Speed
        document.getElementById('speedBox').classList.add('active');
        const startTime = performance.now();
        try {
            const res = await fetch(testFile + "&cb=" + startTime, { cache: 'no-store' });
            const reader = res.body.getReader();
            let loaded = 0;

            while(true) {
                const {done, value} = await reader.read();
                if (done) break;
                loaded += (value.length * 8);
                const time = (performance.now() - startTime) / 1000;
                
                if (time > 0.1) {
                    const kbps = loaded / time / 1024;
                    // Умное переключение единиц
                    if (kbps >= 1024) {
                        sVal.innerText = (kbps / 1024).toFixed(2);
                        sUnit.innerText = "Mbps";
                    } else {
                        sVal.innerText = Math.floor(kbps);
                        sUnit.innerText = "Kbps";
                    }
                }
            }
        } catch(e) {}

        document.getElementById('speedBox').classList.remove('active');
        loader.style.display = 'none';
        startBtn.disabled = false;
        startBtn.innerText = "Retry";
    }

    startBtn.addEventListener('click', runTest);

    // --- ЛОГИКА ФОНОВОЙ ЗМЕЙКИ (АВТО-ИГРА) ---
    const canvas = document.getElementById('snakeBG');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const gridSize = 20;
    let snake = [{x: 10, y: 10}];
    let apple = {x: 15, y: 15};
    let dx = 1, dy = 0;

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const cols = Math.floor(canvas.width / gridSize);
        const rows = Math.floor(canvas.height / gridSize);

        // ИИ для змейки (ищет яблоко)
        const head = snake[0];
        if (head.x < apple.x) { dx = 1; dy = 0; }
        else if (head.x > apple.x) { dx = -1; dy = 0; }
        else if (head.y < apple.y) { dx = 0; dy = 1; }
        else if (head.y > apple.y) { dx = 0; dy = -1; }

        const newHead = { x: (head.x + dx + cols) % cols, y: (head.y + dy + rows) % rows };
        snake.unshift(newHead);

        if (newHead.x === apple.x && newHead.y === apple.y) {
            apple = { x: Math.floor(Math.random() * cols), y: Math.floor(Math.random() * rows) };
        } else {
            snake.pop();
        }

        // Рисуем яблоко
        ctx.fillStyle = '#ef4444';
        ctx.fillRect(apple.x * gridSize, apple.y * gridSize, gridSize - 2, gridSize - 2);

        // Рисуем змейку
        ctx.fillStyle = '#10b981';
        snake.forEach((part, i) => {
            ctx.globalAlpha = 1 - (i / snake.length * 0.8); // Хвост бледнее
            ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
        });
        ctx.globalAlpha = 1;
    }

    setInterval(draw, 80); // Скорость игры
</script>

</body>
</html>
