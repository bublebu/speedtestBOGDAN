
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>speedtestBOGDAN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
--bg:#03050a;
--panel:#09120f;
--card:#101b16;
--accent:#00ff88;
--accent2:#00c853;
--text:#effff5;
--muted:#72d89a;
--red:#ff2957;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body{
width:100%;
height:100%;
overflow:hidden;
font-family:'JetBrains Mono',monospace;
background:radial-gradient(circle at top,#0b1d15 0%,#03050a 60%);
color:var(--text);
}

body{
display:flex;
justify-content:center;
align-items:center;
}

canvas{
position:fixed;
inset:0;
z-index:1;
}

.panel{
position:relative;
z-index:5;
width:390px;
padding:30px;
border-radius:34px;
background:rgba(7,13,11,.82);
backdrop-filter:blur(24px);
border:1px solid rgba(0,255,136,.12);
box-shadow:
0 0 80px rgba(0,255,136,.08),
inset 0 0 40px rgba(0,255,136,.03);
overflow:hidden;
}

.panel::before{
content:"";
position:absolute;
inset:-1px;
border-radius:34px;
padding:1px;
background:linear-gradient(145deg,rgba(0,255,136,.35),transparent,rgba(0,255,136,.15));
-webkit-mask:
linear-gradient(#fff 0 0) content-box,
linear-gradient(#fff 0 0);
-webkit-mask-composite:xor;
pointer-events:none;
}

.logo{
text-align:center;
margin-bottom:28px;
}

.logo h1{
font-size:1.1rem;
letter-spacing:7px;
color:var(--accent);
text-shadow:0 0 20px rgba(0,255,136,.7);
}

.logo p{
margin-top:8px;
font-size:.62rem;
letter-spacing:2px;
color:#70cb97;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-bottom:16px;
}

.card{
position:relative;
overflow:hidden;
background:linear-gradient(180deg,rgba(18,28,23,.92),rgba(9,15,12,.95));
border-radius:24px;
padding:20px;
border:1px solid rgba(0,255,136,.07);
min-height:120px;
}

.card::after{
content:"";
position:absolute;
top:0;
left:-120%;
width:100%;
height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);
animation:shine 4s linear infinite;
}

@keyframes shine{
100%{
left:130%;
}
}

.label{
display:block;
margin-bottom:14px;
font-size:.62rem;
letter-spacing:2px;
color:var(--muted);
}

.value{
font-size:2.5rem;
font-weight:800;
}

.unit{
font-size:.78rem;
color:var(--accent);
}

.speedCard{
position:relative;
overflow:hidden;
background:linear-gradient(180deg,rgba(17,35,24,.96),rgba(8,14,11,.96));
padding:28px;
border-radius:28px;
border:1px solid rgba(0,255,136,.08);
margin-bottom:18px;
}

.speedWrap{
display:flex;
align-items:flex-end;
gap:12px;
}

#speed{
font-size:4.5rem;
line-height:1;
text-shadow:0 0 20px rgba(0,255,136,.25);
}

.status{
margin-top:14px;
font-size:.72rem;
letter-spacing:1px;
color:#7fdea3;
}

button{
position:relative;
width:100%;
padding:18px;
border:none;
border-radius:20px;
background:linear-gradient(90deg,var(--accent2),var(--accent));
color:black;
font-family:inherit;
font-weight:800;
font-size:.9rem;
letter-spacing:2px;
cursor:pointer;
overflow:hidden;
transition:.25s;
box-shadow:0 0 35px rgba(0,255,136,.22);
}

button:hover:not(:disabled){
transform:translateY(-2px) scale(1.01);
box-shadow:0 0 45px rgba(0,255,136,.38);
}

button:disabled{
opacity:.75;
cursor:wait;
}

.loader{
position:absolute;
left:0;
bottom:0;
height:4px;
width:0%;
background:black;
transition:width .15s linear;
}

.ad{
margin-top:18px;
padding:16px;
border-radius:22px;
background:linear-gradient(180deg,rgba(20,15,15,.92),rgba(12,10,10,.92));
border:1px solid rgba(255,41,87,.12);
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
}

.adInfo h3{
font-size:.8rem;
margin-bottom:6px;
color:#ff6f91;
}

.adInfo p{
font-size:.6rem;
color:#d7b4bf;
line-height:1.5;
}

.ad a{
text-decoration:none;
padding:12px 16px;
border-radius:14px;
background:#ff2957;
color:white;
font-size:.7rem;
font-weight:800;
letter-spacing:1px;
transition:.2s;
}

.ad a:hover{
transform:scale(1.05);
box-shadow:0 0 20px rgba(255,41,87,.45);
}

.footer{
margin-top:16px;
text-align:center;
font-size:.55rem;
letter-spacing:1px;
color:#547a63;
}

@media(max-width:480px){
.panel{
width:92%;
padding:22px;
}

#speed{
font-size:3.5rem;
}

.value{
font-size:2rem;
}

.ad{
flex-direction:column;
align-items:flex-start;
}
}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="panel">

<div class="logo">
<h1>SPEEDTEST</h1>
<p>BOGDAN ULTRA NETWORK SYSTEM</p>
</div>

<div class="stats">

<div class="card">
<span class="label">PING</span>
<span id="ping" class="value">0</span>
<span class="unit">ms</span>
</div>

<div class="card">
<span class="label">JITTER</span>
<span id="jitter" class="value">0</span>
<span class="unit">ms</span>
</div>

</div>

<div class="speedCard">
<span class="label">DOWNLOAD SPEED</span>

<div class="speedWrap">
<span id="speed" class="value">0</span>
<span class="unit">Mbps</span>
</div>

<div id="status" class="status">
READY FOR TEST
</div>
</div>

<button id="startBtn">
START TEST
<div id="loader" class="loader"></div>
</button>

<div class="ad">
<div class="adInfo">
<h3>EBLANTALEE</h3>
<p>indie atmospheric game on GameJolt</p>
</div>

<a href="https://gamejolt.com/games/EBLANTALEE/1036721" target="_blank">
OPEN
</a>
</div>

<div class="footer">
REALTIME NETWORK ANALYZER
</div>

</div>

<script>
const pingEl=document.getElementById("ping")
const jitterEl=document.getElementById("jitter")
const speedEl=document.getElementById("speed")
const startBtn=document.getElementById("startBtn")
const loader=document.getElementById("loader")
const statusEl=document.getElementById("status")

const TEST_URL="https://cachefly.cachefly.net/20mb.test"
const TEST_DURATION=12000
const WARMUP=1500

async function pingTest(){
const values=[]

for(let i=0;i<6;i++){
try{
const start=performance.now()

await fetch(
TEST_URL+"?ping="+Math.random(),
{
method:"HEAD",
cache:"no-store"
}
)

values.push(performance.now()-start)
}catch(err){}
}

if(!values.length){
pingEl.innerText="--"
jitterEl.innerText="--"
return
}

const avg=
values.reduce((a,b)=>a+b,0)
/values.length

let jitter=0

for(let i=1;i<values.length;i++){
jitter+=Math.abs(values[i]-values[i-1])
}

jitter/=(values.length-1)

pingEl.innerText=Math.round(avg)
jitterEl.innerText=Math.round(jitter)
}

async function speedTest(){
try{
statusEl.innerText="TESTING DOWNLOAD"

const response=await fetch(
TEST_URL+"&cache="+Date.now(),
{cache:"no-store"}
)

const reader=response.body.getReader()

let received=0
const start=performance.now()
let smooth=0

while(true){
const {done,value}=await reader.read()

if(done)break

received+=value.length

const elapsed=performance.now()-start

loader.style.width=
Math.min((elapsed/TEST_DURATION)*100,100)+"%"

if(elapsed<WARMUP)continue

const seconds=(elapsed-WARMUP)/1000

const speed=
((received*8)/seconds)
/1024
/1024

smooth=
smooth
?(smooth*0.72+speed*0.28)
:speed

speedEl.innerText=smooth.toFixed(1)

if(elapsed>=TEST_DURATION)break
}

statusEl.innerText="COMPLETE"

}catch(err){
speedEl.innerText="ERR"
statusEl.innerText="NETWORK ERROR"
}
}

async function runTest(){
startBtn.disabled=true
loader.style.width="0%"

pingEl.innerText="..."
jitterEl.innerText="..."
speedEl.innerText="0"

statusEl.innerText="INITIALIZING"

await pingTest()
await speedTest()

startBtn.disabled=false
}

startBtn.addEventListener("click",runTest)

const canvas=document.getElementById("bg")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=innerWidth
canvas.height=innerHeight
}

resize()
addEventListener("resize",resize)

const chars="01アイウエオカサタナABCDEFGHIJKLMNOPQRSTUVWXYZ"
const size=16
let columns=[]

function init(){
columns=[]

for(let i=0;i<canvas.width/size;i++){
columns[i]=Math.random()*-100
}
}

init()

function matrix(){
ctx.fillStyle="rgba(3,5,10,.08)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#00ff88"
ctx.font=size+"px JetBrains Mono"

for(let i=0;i<columns.length;i++){
const text=chars[Math.floor(Math.random()*chars.length)]
const x=i*size
const y=columns[i]*size

ctx.fillText(text,x,y)

if(y>canvas.height&&Math.random()>.985){
columns[i]=0
}

columns[i]++
}

requestAnimationFrame(matrix)
}

matrix()
</script>
</body>
</html>
