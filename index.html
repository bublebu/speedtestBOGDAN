<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>speedtestBOGDAN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');

        :root {
            --bg: #020205;
            --accent: #00f2ff;
            --glass: rgba(5, 5, 12, 0.92);
            --text: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #snakeCanvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
            background: #010103;
        }

        .main-interface {
            position: relative;
            z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 40px;
            padding: 50px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.8);
        }

        h1 {
            font-size: 1.2rem;
            letter-spacing: 4px;
            margin-bottom: 40px;
            color: var(--accent);
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .data-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #7000ff;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .data-card.active {
            border-left-color: var(--accent);
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
        }

        .label { font-size: 0.65rem; color: #666; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .num { font-size: 3rem; font-weight: 800; color: #fff; line-height: 1; }
        .unit { color: var(--accent); font-size: 0.9rem; margin-left: 5px; }

        .btn-start {
            width: 100%;
            padding: 20px;
            border-radius: 15px;
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
        }

        .btn-start:hover:not(:disabled) {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 30px var(--accent);
        }

        .btn-start:disabled { opacity: 0.3; cursor: not-allowed; }

        .mini-loader {
            position: absolute;
            bottom: -1px; left: 0; width: 100%; height: 4px;
            background: rgba(0, 242, 255, 0.1);
            display: none;
            overflow: hidden;
            border-radius: 0 0 15px 15px;
        }
        .mini-snake {
            position: absolute;
            height: 100%; width: 30%;
            background: var(--accent);
            animation: move 1.5s infinite ease-in-out;
            box-shadow: 0 0 10px var(--accent);
        }
        @keyframes move { from { left: -40%; } to { left: 110%; } }
    </style>
</head>
<body>

<canvas id="snakeCanvas"></canvas>

<div class="main-interface">
    <h1>speedtestBOGDAN</h1>
    
    <div id="pCard" class="data-card">
        <span class="label">Response Delay</span>
        <span id="pRes" class="num">0</span><span class="unit">ms</span>
    </div>

    <div id="sCard" class="data-card">
        <span class="label">Network Speed</span>
        <span id="sRes" class="num">0</span><span id="sUnit" class="unit">Mbps</span>
    </div>

    <button id="run" class="btn-start">
        Execute Test
        <div id="loader" class="mini-loader"><div class="mini-snake"></div></div>
    </button>
</div>

<script>
    const runBtn = document.getElementById('run');
    const sRes = document.getElementById('sRes');
    const sUnit = document.getElementById('sUnit');
    const pRes = document.getElementById('pRes');
    const loader = document.getElementById('loader');

    // Исправленная ссылка (без скобок). 
    // Если Cloudflare все равно будет тупить, можно заменить на файл с другого CDN.
    const testData = "https://speed.cloudflare.com/__down?bytes=25000000";

    async function startSpeedTest() {
        runBtn.disabled = true;
        loader.style.display = 'block';
        sRes.innerText = "0";
        pRes.innerText = "...";
        
        // 1. Ping (Замеряем до ближайшего узла или самого GitHub)
        document.getElementById('pCard').classList.add('active');
        let pings = [];
        try {
            for(let i=0; i<4; i++) {
                const t = performance.now();
                await fetch(window.location.origin + "/?nocache=" + Math.random(), { mode: 'no-cors' });
                pings.push(performance.now() - t);
            }
            pRes.innerText = Math.min(...pings).toFixed(0);
        } catch(e) { pRes.innerText = "!"; }
        document.getElementById('pCard').classList.remove('active');

        // 2. Speed Test
        document.getElementById('sCard').classList.add('active');
        const start = performance.now();
        try {
            const response = await fetch(testData + "&cb=" + start, { cache: 'no-store' });
            if (!response.ok) throw new Error();
            
            const reader = response.body.getReader();
            let received = 0;

            while(true) {
                const {done, value} = await reader.read();
                if (done) break;
                received += (value.length * 8); // в биты
                const time = (performance.now() - start) / 1000;
                
                if (time > 0.1) {
                    const mbps = (received / time) / (1024 * 1024);
                    sRes.innerText = mbps > 10 ? mbps.toFixed(1) : mbps.toFixed(2);
                    sUnit.innerText = "Mbps";
                }
            }
        } catch(e) { 
            sRes.innerText = "ERR"; 
            console.error("Ошибка теста. Возможно, ресурс заблокирован провайдером.");
        }

        document.getElementById('sCard').classList.remove('active');
        loader.style.display = 'none';
        runBtn.disabled = false;
        runBtn.innerText = "Restart";
    }

    runBtn.addEventListener('click', startSpeedTest);

    // --- УЛУЧШЕННАЯ ЗМЕЙКА (Smart Auto-Pilot) ---
    const canvas = document.getElementById('snakeCanvas');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const tile = 24;
    let w, h;
    let snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
    let food = {x: 15, y: 15};
    let dx = 1, dy = 0;

    function drawSnake() {
        w = Math.floor(canvas.width / tile);
        h = Math.floor(canvas.height / tile);

        ctx.fillStyle = "#010103";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        const head = {...snake[0]};

        // Улучшенный ИИ: сначала выбираем направление по X, потом по Y
        if (head.x !== food.x) {
            let nextDx = head.x < food.x ? 1 : -1;
            // Проверка, чтобы не развернуться в себя на 180 градусов
            if (nextDx !== -dx) { dx = nextDx; dy = 0; } 
            else { dy = head.y < food.y ? 1 : -1; dx = 0; }
        } else if (head.y !== food.y) {
            let nextDy = head.y < food.y ? 1 : -1;
            if (nextDy !== -dy) { dy = nextDy; dx = 0; }
        }

        const next = { x: (head.x + dx + w) % w, y: (head.y + dy + h) % h };
        
        // Если впереди хвост — пытаемся свернуть
        if (snake.some(seg => seg.x === next.x && seg.y === next.y)) {
             // Простейший маневр уклонения: меняем ось
             if (dx !== 0) { dx = 0; dy = 1; } else { dx = 1; dy = 0; }
        }

        snake.unshift({ x: (head.x + dx + w) % w, y: (head.y + dy + h) % h });

        if (snake[0].x === food.x && snake[0].y === food.y) {
            food = { x: Math.floor(Math.random() * w), y: Math.floor(Math.random() * h) };
        } else {
            snake.pop();
        }

        // Еда
        ctx.fillStyle = "#ff2d55";
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#ff2d55";
        ctx.fillRect(food.x * tile + 4, food.y * tile + 4, tile - 8, tile - 8);

        // Змейка
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#00ff88";
        snake.forEach((p, i) => {
            ctx.fillStyle = i === 0 ? "#00ff88" : "#00aa66";
            ctx.globalAlpha = 1 - (i / snake.length * 0.6);
            ctx.fillRect(p.x * tile + 1, p.y * tile + 1, tile - 2, tile - 2);
        });
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
    }

    setInterval(drawSnake, 80);
</script>

</body>
</html>
