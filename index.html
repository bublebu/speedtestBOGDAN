<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedTest Mr. Dot Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');

        :root {
            --bg: #050505;
            --accent: #00f2ff;
            --accent-2: #7000ff;
            --glass: rgba(15, 15, 25, 0.7);
            --text: #e0e0e0;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Анимированный фон */
        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
            z-index: -1;
        }

        .bg-animate::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Основная карточка */
        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 30px;
            padding: 40px;
            width: 380px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 242, 255, 0.05);
            position: relative;
        }

        h1 {
            font-weight: 800;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 30px;
            color: var(--accent);
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.6);
        }

        .metrics {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        .box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 20px;
            border-left: 4px solid var(--accent-2);
            transition: 0.3s;
        }

        .box.active { border-left-color: var(--accent); box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }

        .label { font-size: 0.7rem; text-transform: uppercase; color: #888; display: block; margin-bottom: 5px; }
        .num { font-size: 2.8rem; font-weight: 800; color: #fff; }
        .unit { font-size: 0.9rem; color: var(--accent); margin-left: 5px; }

        button {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(45deg, var(--accent-2), var(--accent));
            color: #fff;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            box-shadow: 0 5px 20px rgba(112, 0, 255, 0.4);
        }

        button:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0, 242, 255, 0.5); }
        button:disabled { filter: grayscale(1); cursor: not-allowed; opacity: 0.5; }

        .status { margin-top: 20px; font-size: 0.8rem; color: #666; height: 1em; }

        /* --- ЗМЕЙКА --- */
        .snake-track {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 0 0 30px 30px;
            overflow: hidden;
            display: none;
        }

        .snake {
            position: absolute;
            height: 100%;
            width: 80px;
            background: linear-gradient(90deg, transparent, var(--accent), #fff, var(--accent), transparent);
            filter: drop-shadow(0 0 10px var(--accent));
            animation: moveSnake 1.2s infinite linear;
        }

        @keyframes moveSnake {
            0% { left: -100px; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>

<div class="bg-animate"></div>

<div class="container">
    <h1>System Status</h1>
    
    <div class="metrics">
        <div id="p-box" class="box">
            <span class="label">Response Time</span>
            <span id="pingVal" class="num">0</span><span class="unit">ms</span>
        </div>
        <div id="d-box" class="box">
            <span class="label">Downlink Speed</span>
            <span id="speedVal" class="num">0.0</span><span class="unit">mbps</span>
        </div>
    </div>

    <button id="runBtn">Инициализировать Тест</button>
    <p id="status" class="status">Система готова</p>

    <div id="snakeTrack" class="snake-track"><div class="snake"></div></div>
</div>

<script>
    const runBtn = document.getElementById('runBtn');
    const pingDisplay = document.getElementById('pingVal');
    const speedDisplay = document.getElementById('speedVal');
    const statusText = document.getElementById('status');
    const snakeTrack = document.getElementById('snakeTrack');

    // Файл поменьше (~2MB) для слабых сетей
    const testURL = "https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=60&w=2000&auto=format&fit=crop";

    async function startTest() {
        runBtn.disabled = true;
        snakeTrack.style.display = 'block';
        statusText.innerText = "Установка соединения...";
        document.getElementById('p-box').classList.add('active');

        // 1. Тест Ping
        let pings = [];
        for(let i=0; i<3; i++) {
            const start = performance.now();
            try {
                await fetch(window.location.href + "?t=" + Math.random(), { mode: 'no-cors', cache: 'no-store' });
                pings.push(performance.now() - start);
            } catch(e) {}
            await new Promise(r => setTimeout(r, 100));
        }
        const minPing = pings.length ? Math.min(...pings).toFixed(0) : "---";
        pingDisplay.innerText = minPing;
        document.getElementById('p-box').classList.remove('active');

        // 2. Тест Скорости
        statusText.innerText = "Анализ потока данных...";
        document.getElementById('d-box').classList.add('active');
        
        const startTime = performance.now();
        try {
            const response = await fetch(testURL + "&cb=" + startTime, { cache: 'no-store' });
            const reader = response.body.getReader();
            let receivedLength = 0;

            while(true) {
                const {done, value} = await reader.read();
                if (done) break;
                receivedLength += value.length;
                
                // Промежуточный замер для слабого интернета
                const timeNow = (performance.now() - startTime) / 1000;
                if (timeNow > 0.5) {
                    const currentMbps = ((receivedLength * 8) / timeNow / 1024 / 1024).toFixed(1);
                    speedDisplay.innerText = currentMbps;
                }
            }

            const totalTime = (performance.now() - startTime) / 1000;
            const finalMbps = ((receivedLength * 8) / totalTime / 1024 / 1024).toFixed(1);
            speedDisplay.innerText = finalMbps;
            statusText.innerText = "Анализ завершен успешно.";

        } catch (error) {
            statusText.innerText = "Ошибка: Соединение слишком слабое.";
            console.error(error);
        }

        document.getElementById('d-box').classList.remove('active');
        snakeTrack.style.display = 'none';
        runBtn.disabled = false;
        runBtn.innerText = "ПЕРЕЗАПУСТИТЬ";
    }

    runBtn.addEventListener('click', startTest);
</script>

</body>
</html>
