<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>speedtestBOGDAN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');

        :root {
            --bg: #020205;
            --accent: #00f2ff;
            --glass: rgba(5, 5, 12, 0.92);
            --text: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Холст со змейкой — теперь он и есть фон */
        #snakeCanvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 1; /* Самый нижний слой */
            background: #010103;
        }

        /* Контент поверх змейки */
        .main-interface {
            position: relative;
            z-index: 10; /* Поверх фона */
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 40px;
            padding: 50px;
            width: 400px;
            text-align: center;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.8);
        }

        h1 {
            font-size: 1.4rem;
            letter-spacing: 5px;
            margin-bottom: 40px;
            color: var(--accent);
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .data-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #7000ff;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .data-card.active {
            border-left-color: var(--accent);
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
        }

        .label { font-size: 0.7rem; color: #555; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .num { font-size: 3.2rem; font-weight: 800; color: #fff; line-height: 1; }
        .unit { color: var(--accent); font-size: 1rem; margin-left: 8px; }

        .btn-start {
            width: 100%;
            padding: 20px;
            border-radius: 15px;
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.4s;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .btn-start:hover:not(:disabled) {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 40px var(--accent);
        }

        .btn-start:disabled { opacity: 0.2; cursor: not-allowed; }

        /* Тонкая змейка-загрузка снизу кнопки */
        .mini-loader {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 4px;
            background: rgba(0, 242, 255, 0.05);
            display: none;
            overflow: hidden;
            border-radius: 0 0 40px 40px;
        }
        .mini-snake {
            position: absolute;
            height: 100%; width: 100px;
            background: var(--accent);
            animation: move 1.2s infinite linear;
            box-shadow: 0 0 10px var(--accent);
        }
        @keyframes move { from { left: -100px; } to { left: 100%; } }
    </style>
</head>
<body>

<!-- Фоновая игра -->
<canvas id="snakeCanvas"></canvas>

<div class="main-interface">
    <h1>speedtestBOGDAN</h1>
    
    <div id="pCard" class="data-card">
        <span class="label">Response Delay</span>
        <span id="pRes" class="num">0</span><span class="unit">ms</span>
    </div>

    <div id="sCard" class="data-card">
        <span class="label">Network Speed</span>
        <span id="sRes" class="num">0</span><span id="sUnit" class="unit">Kbps</span>
    </div>

    <button id="run" class="btn-start">Execute Test</button>
    <div id="loader" class="mini-loader"><div class="mini-snake"></div></div>
</div>

<script>
    // --- 1. ТЕСТ СКОРОСТИ ---
    const runBtn = document.getElementById('run');
    const sRes = document.getElementById('sRes');
    const sUnit = document.getElementById('sUnit');
    const pRes = document.getElementById('pRes');
    const loader = document.getElementById('loader');

    // Файл для теста (средний размер для точности на любой сети)
    const testData = "https://speed.cloudflare.com/__down?bytes=5000000";

    async function startSpeedTest() {
        runBtn.disabled = true;
        loader.style.display = 'block';
        
        // Ping
        document.getElementById('pCard').classList.add('active');
        let pings = [];
        for(let i=0; i<3; i++) {
            const t = performance.now();
            await fetch(window.location.href + "?nocache=" + Math.random(), { mode: 'no-cors' });
            pings.push(performance.now() - t);
        }
        pRes.innerText = Math.min(...pings).toFixed(0);
        document.getElementById('pCard').classList.remove('active');

        // Speed
        document.getElementById('sCard').classList.add('active');
        const start = performance.now();
        try {
            const response = await fetch(testData + "&cb=" + start, { cache: 'no-store' });
            const reader = response.body.getReader();
            let received = 0;

            while(true) {
                const {done, value} = await reader.read();
                if (done) break;
                received += (value.length * 8);
                const time = (performance.now() - start) / 1000;
                
                if (time > 0.1) {
                    const kbps = received / time / 1024;
                    // ФИЧА: Умное переключение единиц
                    if (kbps >= 1024) {
                        sRes.innerText = (kbps / 1024).toFixed(2);
                        sUnit.innerText = "Mbps";
                    } else {
                        sRes.innerText = Math.floor(kbps);
                        sUnit.innerText = "Kbps";
                    }
                }
            }
        } catch(e) { sRes.innerText = "ERR"; }

        document.getElementById('sCard').classList.remove('active');
        loader.style.display = 'none';
        runBtn.disabled = false;
        runBtn.innerText = "Restart";
    }

    runBtn.addEventListener('click', startSpeedTest);

    // --- 2. ФОНОВАЯ ЗМЕЙКА (AUTO-AI) ---
    const canvas = document.getElementById('snakeCanvas');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const tile = 24; // Размер пикселя
    let snake = [{x: 5, y: 5}, {x: 4, y: 5}, {x: 3, y: 5}];
    let food = {x: 10, y: 10};
    let dx = 1, dy = 0;

    function drawSnake() {
        ctx.fillStyle = "#010103"; // Очистка
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        const w = Math.floor(canvas.width / tile);
        const h = Math.floor(canvas.height / tile);

        // Авто-пилот (ИИ)
        const head = snake[0];
        if (head.x < food.x) { dx = 1; dy = 0; }
        else if (head.x > food.x) { dx = -1; dy = 0; }
        else if (head.y < food.y) { dx = 0; dy = 1; }
        else if (head.y > food.y) { dx = 0; dy = -1; }

        const next = { x: (head.x + dx + w) % w, y: (head.y + dy + h) % h };
        snake.unshift(next);

        if (next.x === food.x && next.y === food.y) {
            food = { x: Math.floor(Math.random() * w), y: Math.floor(Math.random() * h) };
        } else {
            snake.pop();
        }

        // Рисуем еду
        ctx.fillStyle = "#ef4444";
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#ef4444";
        ctx.fillRect(food.x * tile, food.y * tile, tile - 2, tile - 2);

        // Рисуем змею
        ctx.fillStyle = "#00ff88";
        ctx.shadowColor = "#00ff88";
        snake.forEach((p, i) => {
            ctx.globalAlpha = 1 - (i / snake.length * 0.7);
            ctx.fillRect(p.x * tile, p.y * tile, tile - 2, tile - 2);
        });
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
    }

    setInterval(drawSnake, 100); // Скорость змейки
</script>

</body>
</html>
