<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>speedtestBOGDAN</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');

:root{
    --bg:#020205;
    --accent:#00ff41;
    --glass:rgba(5,12,5,.95);
    --text:#fff;
}

*{
    box-sizing:border-box;
}

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:var(--bg);
    font-family:'JetBrains Mono', monospace;
    color:var(--text);
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

#snakeCanvas{
    position:fixed;
    inset:0;
    background:#010401;
    z-index:1;
}

.main-interface{
    position:relative;
    z-index:10;

    width:300px;

    padding:35px;

    border-radius:35px;

    background:var(--glass);

    backdrop-filter:blur(20px);

    border:1px solid rgba(0,255,65,.15);

    box-shadow:
        0 0 60px rgba(0,255,65,.08),
        inset 0 0 30px rgba(0,255,65,.03);
}

h1{
    margin:0 0 25px;
    text-align:center;
    color:var(--accent);
    letter-spacing:4px;
    font-size:.9rem;
    text-transform:uppercase;
    text-shadow:0 0 10px var(--accent);
}

.data-card{
    background:rgba(0,0,0,.7);

    border-left:4px solid #008f11;

    border-radius:20px;

    padding:16px;

    margin-bottom:12px;
}

.label{
    display:block;
    margin-bottom:6px;

    color:#00a52a;

    font-size:.55rem;

    letter-spacing:2px;

    text-transform:uppercase;
}

.num{
    font-size:2rem;
    font-weight:800;
}

.unit{
    color:var(--accent);
    font-size:.7rem;
}

.btn-start{
    position:relative;

    width:100%;

    padding:16px;

    overflow:hidden;

    border:none;
    border-radius:14px;

    background:transparent;

    border:2px solid var(--accent);

    color:var(--accent);

    font-family:inherit;

    font-weight:800;

    cursor:pointer;

    transition:.25s;
}

.btn-start:hover:not(:disabled){
    background:var(--accent);
    color:#000;
    box-shadow:0 0 30px var(--accent);
}

.btn-start:disabled{
    opacity:.5;
    cursor:not-allowed;
}

.loader-bar{
    position:absolute;
    left:0;
    bottom:0;

    height:4px;
    width:0%;

    background:var(--accent);

    transition:width .1s linear;
}
</style>
</head>
<body>

<canvas id="snakeCanvas"></canvas>

<div class="main-interface">

    <h1>speedtestBOGDAN</h1>

    <div class="data-card">
        <span class="label">PING</span>
        <span id="pingResult" class="num">0</span>
        <span class="unit">ms</span>
    </div>

    <div class="data-card">
        <span class="label">DOWNLOAD</span>
        <span id="speedResult" class="num">0</span>
        <span class="unit">Mbps</span>
    </div>

    <button id="startBtn" class="btn-start">
        EXECUTE
        <div id="loader" class="loader-bar"></div>
    </button>

</div>

<script>
/* =========================
   SPEED TEST
========================= */

const startBtn = document.getElementById("startBtn");
const speedResult = document.getElementById("speedResult");
const pingResult = document.getElementById("pingResult");
const loader = document.getElementById("loader");

/*
    ВАЖНО:
    Эти файлы работают на GitHub Pages,
    потому что сервер разрешает CORS.
*/

const TEST_FILE =
    "https://proof.ovh.net/files/100Mb.dat";

async function measurePing() {

    const samples = [];

    for(let i = 0; i < 3; i++){

        const start = performance.now();

        try{

            await fetch(
                "https://api.github.com/zen?cache=" + Date.now(),
                {
                    cache:"no-store"
                }
            );

            const ping = performance.now() - start;

            samples.push(ping);

        }catch(e){}
    }

    if(samples.length){

        const avg =
            samples.reduce((a,b)=>a+b,0) / samples.length;

        pingResult.innerText = Math.round(avg);

    }else{
        pingResult.innerText = "ERR";
    }
}

async function startSpeedTest(){

    startBtn.disabled = true;

    speedResult.innerText = "0";

    pingResult.innerText = "...";

    loader.style.width = "0%";

    await measurePing();

    try{

        const response = await fetch(
            TEST_FILE + "?cache=" + Date.now(),
            {
                cache:"no-store"
            }
        );

        const reader = response.body.getReader();

        const total =
            Number(
                response.headers.get("content-length")
            ) || 100000000;

        let received = 0;

        const startTime = performance.now();

        while(true){

            const {done, value} =
                await reader.read();

            if(done) break;

            received += value.length;

            const seconds =
                (performance.now() - startTime) / 1000;

            if(seconds > 0){

                const mbps =
                    ((received * 8) / seconds) /
                    1024 /
                    1024;

                speedResult.innerText =
                    mbps.toFixed(2);

                const percent =
                    (received / total) * 100;

                loader.style.width =
                    Math.min(percent,100) + "%";
            }
        }

    }catch(error){

        console.error(error);

        speedResult.innerText = "ERR";
    }

    startBtn.disabled = false;

    startBtn.innerHTML =
        'RESTART<div id="loader" class="loader-bar" style="width:100%"></div>';
}

startBtn.addEventListener("click", startSpeedTest);

/* =========================
   MATRIX SNAKE
========================= */

const canvas = document.getElementById("snakeCanvas");
const ctx = canvas.getContext("2d");

const tile = 20;

let snake = [
    {x:10,y:10},
    {x:9,y:10}
];

let foods = [
    {x:15,y:15}
];

let dx = 1;
let dy = 0;

function resize(){

    canvas.width = innerWidth;
    canvas.height = innerHeight;
}

addEventListener("resize", resize);

resize();

function updateSnake(){

    const w = Math.floor(canvas.width / tile);
    const h = Math.floor(canvas.height / tile);

    const head = {...snake[0]};

    let target = foods[0];
    let min = Infinity;

    for(const food of foods){

        const dist =
            Math.abs(food.x - head.x) +
            Math.abs(food.y - head.y);

        if(dist < min){

            min = dist;
            target = food;
        }
    }

    if(head.x < target.x && dx !== -1){

        dx = 1;
        dy = 0;
    }
    else if(head.x > target.x && dx !== 1){

        dx = -1;
        dy = 0;
    }
    else if(head.y < target.y && dy !== -1){

        dx = 0;
        dy = 1;
    }
    else if(head.y > target.y && dy !== 1){

        dx = 0;
        dy = -1;
    }

    const next = {
        x:(head.x + dx + w) % w,
        y:(head.y + dy + h) % h
    };

    snake.unshift(next);

    let ate = false;

    foods = foods.filter(food=>{

        if(food.x === next.x && food.y === next.y){

            ate = true;
            return false;
        }

        return true;
    });

    if(ate){

        for(let i=0;i<2;i++){

            foods.push({
                x:Math.floor(Math.random()*w),
                y:Math.floor(Math.random()*h)
            });
        }

    }else{

        snake.pop();
    }
}

function draw(){

    ctx.fillStyle = "#010401";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.shadowBlur = 10;
    ctx.shadowColor = "#ff003c";

    ctx.fillStyle = "#ff003c";

    for(const food of foods){

        ctx.fillRect(
            food.x * tile + 4,
            food.y * tile + 4,
            tile - 8,
            tile - 8
        );
    }

    ctx.shadowBlur = 8;
    ctx.shadowColor = "#00ff41";

    snake.forEach((part,index)=>{

        ctx.fillStyle =
            index === 0
            ? "#00ff41"
            : "#003b00";

        ctx.fillRect(
            part.x * tile + 1,
            part.y * tile + 1,
            tile - 2,
            tile - 2
        );
    });

    ctx.shadowBlur = 0;
}

let last = 0;

function loop(timestamp){

    if(timestamp - last > 70){

        updateSnake();

        draw();

        last = timestamp;
    }

    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
