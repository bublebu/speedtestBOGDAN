<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>speedtestBOGDAN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');

        :root {
            --bg: #020205;
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.4);
            --secondary: #bc13fe;
            --glass: rgba(10, 10, 15, 0.85);
            --text: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Анимированный кибер-фон */
        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%);
            z-index: -1;
        }
        .grid-bg::before {
            content: "";
            position: absolute;
            width: 200%; height: 200%;
            top: -50%; left: -50%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg);
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(40px); }
        }

        /* Контейнер */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(0, 242, 255, 0.15);
            border-radius: 40px;
            padding: 50px 40px;
            width: 400px;
            text-align: center;
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.9), inset 0 0 30px rgba(0, 242, 255, 0.05);
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 1.6rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 0 0 40px 0;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .display {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            border-bottom: 3px solid var(--secondary);
            transition: 0.3s;
        }

        .display.active {
            border-bottom-color: var(--accent);
            box-shadow: 0 10px 30px -10px var(--accent-glow);
        }

        .label {
            font-size: 0.75rem;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
        }

        .value {
            font-size: 3.5rem;
            font-weight: 800;
            color: #fff;
            line-height: 1;
        }

        .unit {
            color: var(--accent);
            font-size: 1rem;
            margin-left: 8px;
            font-weight: 400;
        }

        /* Кнопка */
        .btn-main {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .btn-main:hover:not(:disabled) {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 40px var(--accent-glow);
        }

        .btn-main:disabled {
            opacity: 0.3;
            filter: grayscale(1);
        }

        .status-msg {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #555;
            min-height: 1.2rem;
        }

        /* Змейка 2.0 */
        .snake-wrap {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 8px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 0 0 40px 40px;
            overflow: hidden;
            display: none;
        }

        .snake-core {
            position: absolute;
            height: 100%;
            width: 120px;
            background: linear-gradient(90deg, transparent, var(--accent), #fff, var(--accent), transparent);
            filter: drop-shadow(0 0 8px var(--accent));
            animation: snakeMove 1s infinite cubic-bezier(0.4, 0, 0.6, 1);
        }

        @keyframes snakeMove {
            0% { left: -150px; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>

<div class="grid-bg"></div>

<div class="glass-card">
    <h1>speedtestBOGDAN</h1>
    
    <div id="ping-box" class="display">
        <span class="label">Задержка сети</span>
        <span id="pingVal" class="value">0</span><span class="unit">ms</span>
    </div>

    <div id="speed-box" class="display">
        <span class="label">Битрейт потока</span>
        <span id="speedVal" class="value">0</span><span class="unit">Kbps</span>
    </div>

    <button id="mainBtn" class="btn-main">Запуск Системы</button>
    
    <div id="status" class="status-msg">Мониторинг готов</div>

    <div id="snake" class="snake-wrap"><div class="snake-core"></div></div>
</div>

<script>
    const btn = document.getElementById('mainBtn');
    const pVal = document.getElementById('pingVal');
    const sVal = document.getElementById('speedVal');
    const status = document.getElementById('status');
    const snake = document.getElementById('snake');
    const sBox = document.getElementById('speed-box');
    const pBox = document.getElementById('ping-box');

    // Оптимизированный файл для замера на слабых скоростях (~2.5 MB)
    const dataUrl = "https://images.unsplash.com/photo-1534972195531-d756b9bfa9f2?q=70&w=2500&auto=format&fit=crop";

    async function runTest() {
        btn.disabled = true;
        snake.style.display = 'block';
        status.innerText = "Синхронизация узлов...";
        pBox.classList.add('active');

        // 1. Точный Ping
        let pings = [];
        for(let i=0; i<4; i++) {
            const start = performance.now();
            try {
                await fetch(window.location.href + "?v=" + Math.random(), { mode: 'no-cors', cache: 'no-store' });
                pings.push(performance.now() - start);
            } catch(e) {}
            await new Promise(r => setTimeout(r, 150));
        }
        pVal.innerText = pings.length ? Math.min(...pings).toFixed(0) : "ERR";
        pBox.classList.remove('active');

        // 2. Тест скорости (Kbps)
        status.innerText = "Захват данных пакетов...";
        sBox.classList.add('active');
        
        const startTime = performance.now();
        try {
            const response = await fetch(dataUrl + "&cache=" + startTime, { cache: 'no-store' });
            const reader = response.body.getReader();
            let totalBits = 0;

            while(true) {
                const {done, value} = await reader.read();
                if (done) break;
                totalBits += (value.length * 8); // Переводим байты в биты
                
                const timeElapsed = (performance.now() - startTime) / 1000;
                if (timeElapsed > 0.2) {
                    // Рассчитываем Кбит/с (через 1024)
                    const kbps = Math.floor(totalBits / timeElapsed / 1024);
                    sVal.innerText = kbps.toLocaleString('ru-RU'); // Добавляем разделение тысяч для красоты
                }
            }

            const finalTime = (performance.now() - startTime) / 1000;
            const finalKbps = Math.floor(totalBits / finalTime / 1024);
            sVal.innerText = finalKbps.toLocaleString('ru-RU');
            status.innerText = "Диагностика завершена.";

        } catch (err) {
            status.innerText = "Сбой: Превышено время ожидания.";
        }

        sBox.classList.remove('active');
        snake.style.display = 'none';
        btn.disabled = false;
        btn.innerText = "ПОВТОРИТЬ";
    }

    btn.addEventListener('click', runTest);
</script>

</body>
</html>
